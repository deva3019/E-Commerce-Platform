<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <header class="bg-blue-600 text-white py-6 shadow-lg">
        <div class="container mx-auto px-4">
            <h1 class="text-4xl font-bold">Welcome to Our E-Commerce Platform</h1>
            <p class="text-blue-100 mt-2">Shop the best products online</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Products Section -->
            <section id="product-list" class="lg:col-span-2">
                <h2 class="text-3xl font-bold mb-6 text-gray-800">Products</h2>
                <div id="products-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Products will be generated by JavaScript -->
                </div>
            </section>

            <!-- Shopping Cart Section -->
            <section id="shopping-cart" class="lg:col-span-1">
                <div class="bg-white rounded-lg shadow-lg p-6 sticky top-8">
                    <h2 class="text-2xl font-bold mb-4 text-gray-800">Shopping Cart</h2>
                    <ul id="cart-items" class="space-y-3 mb-4 max-h-96 overflow-y-auto">
                        <li class="text-gray-500">Your cart is empty</li>
                    </ul>
                    <div class="border-t pt-4 mb-4">
                        <p id="total-price" class="text-xl font-bold text-gray-800">Total: $0</p>
                    </div>
                    <button id="checkout" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200">
                        Checkout
                    </button>
                    <button id="clear-cart" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-lg mt-2 transition duration-200">
                        Clear Cart
                    </button>
                </div>
            </section>
        </div>
    </main>


<script>
document.addEventListener('DOMContentLoaded', () => {
    const products = [
        { id: 1, name: 'Laptop', price: 999, image: '💻' },
        { id: 2, name: 'Headphones', price: 149, image: '🎧' },
        { id: 3, name: 'Smartphone', price: 799, image: '📱' },
        { id: 4, name: 'Tablet', price: 499, image: '📱' },
        { id: 5, name: 'Smart Watch', price: 299, image: '⌚' },
        { id: 6, name: 'Camera', price: 699, image: '📷' }
    ];

    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function displayProducts() {
        const container = document.getElementById('products-container');
        container.innerHTML = '';
        
        products.forEach(product => {
            const productDiv = document.createElement('div');
            productDiv.className = 'bg-white rounded-lg shadow-md hover:shadow-lg transition p-4';
            productDiv.innerHTML = `
                <div class="text-5xl text-center mb-3">${product.image}</div>
                <h3 class="text-xl font-bold text-gray-800 mb-2">${product.name}</h3>
                <p class="text-gray-600 mb-4">Price: <span class="text-2xl font-bold text-green-600">$${product.price}</span></p>
                <button class="add-to-cart w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition" data-id="${product.id}">
                    Add to Cart
                </button>
            `;
            container.appendChild(productDiv);
        });

        document.querySelectorAll('.add-to-cart').forEach(button => {
            button.addEventListener('click', (e) => {
                const productId = parseInt(e.target.dataset.id);
                addToCart(productId);
            });
        });
    }

    function addToCart(productId) {
        const product = products.find(p => p.id === productId);
        const existingProduct = cart.find(item => item.id === productId);

        if (existingProduct) {
            existingProduct.quantity += 1;
        } else {
            cart.push({ ...product, quantity: 1 });
        }

        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartDisplay();
    }

    function updateCartDisplay() {
        const cartContainer = document.getElementById('cart-items');
        const totalPrice = document.getElementById('total-price');

        if (cart.length === 0) {
            cartContainer.innerHTML = '<li class="text-gray-500">Your cart is empty</li>';
            totalPrice.textContent = 'Total: $0';
            return;
        }

        cartContainer.innerHTML = '';
        let total = 0;

        cart.forEach((item, index) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;

            const cartItem = document.createElement('li');
            cartItem.className = 'bg-gray-100 p-3 rounded-lg flex justify-between items-center';
            cartItem.innerHTML = `
                <div>
                    <p class="font-bold text-gray-800">${item.name}</p>
                    <p class="text-sm text-gray-600">$${item.price} x ${item.quantity}</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="removeFromCart(${index})" class="bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded text-sm">Remove</button>
                </div>
            `;
            cartContainer.appendChild(cartItem);
        });

        totalPrice.textContent = `Total: $${total.toFixed(2)}`;
    }

    window.removeFromCart = function(index) {
        cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartDisplay();
    };

    document.getElementById('checkout').addEventListener('click', () => {
        if (cart.length === 0) {
            alert('Your cart is empty!');
            return;
        }
        alert('Thank you for your purchase! Total items: ' + cart.length);
        cart = [];
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartDisplay();
    });

    document.getElementById('clear-cart').addEventListener('click', () => {
        cart = [];
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartDisplay();
    });

    displayProducts();
    updateCartDisplay();
});
</script>    

    <footer class="bg-gray-800 text-white py-6 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 E-Commerce Platform. All rights reserved.</p>
        </div>
    </footer>
    </body>
</html>
